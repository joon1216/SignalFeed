<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalFeed - 오늘의 결론</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #0D0D0D; /* Dark background for conclusion */
            color: #F8F6F0;
        }
        .container {
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            background-color: #0D0D0D;
            position: relative;
            box-sizing: border-box;
            padding: 70px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .signalfeed-header {
            position: absolute;
            top: 70px;
            left: 80px;
            font-size: 24px;
            font-weight: 700;
            color: #00C853;
        }
        .slide-number {
            position: absolute;
            top: 70px;
            right: 80px;
            font-size: 24px;
            font-weight: 500;
            color: #D0CCC6;
        }
        .main-title {
            font-size: 72px;
            font-weight: 900;
            line-height: 1.2;
            color: #F8F6F0;
            margin-top: 100px;
            margin-bottom: 60px;
            text-align: center;
            letter-spacing: -2px;
        }
        .summary-box {
            background-color: #1A1A1A; /* Slightly lighter dark */
            border-left: 8px solid #00C853;
            border-radius: 12px;
            padding: 50px 60px;
            width: calc(100% - 120px);
            margin-bottom: 60px;
        }
        .summary-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .summary-list li {
            position: relative;
            padding-left: 45px;
            font-size: 32px;
            font-weight: 400;
            line-height: 1.5;
            color: #E0E0E0;
        }
        .summary-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            top: 0;
            font-size: 40px;
            color: #00C853;
            line-height: 1.5;
        }
        .attention-box {
            background-color: #282828;
            border-radius: 12px;
            padding: 40px 60px;
            width: calc(100% - 120px);
            margin-bottom: 80px;
        }
        .attention-label {
            font-size: 28px;
            font-weight: 600;
            color: #00C853;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .attention-point {
            font-size: 30px;
            font-weight: 500;
            line-height: 1.5;
            color: #F8F6F0;
        }
        .cta-box {
            background-color: #00C853;
            border-radius: 16px;
            padding: 45px 60px;
            width: calc(100% - 160px); /* slightly smaller for accent */
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 200, 83, 0.3);
        }
        .cta-text {
            font-size: 48px;
            font-weight: 700;
            color: #0D0D0D;
            line-height: 1.3;
        }
        .source {
            position: absolute;
            bottom: 70px;
            right: 80px;
            font-size: 20px;
            color: #777;
        }
    </style>
</head>
<body>
    <div id="slide-5" class="container">
        <div class="signalfeed-header" style="word-break:keep-all;overflow-wrap:break-word;">SIGNALFEED</div>
        <div class="slide-number" style="word-break:keep-all;overflow-wrap:break-word;">5/5</div>

        <h1 class="main-title" style="word-break:keep-all;overflow-wrap:break-word;">
            오늘의 결론
        </h1>

        <div class="summary-box">
            <ul class="summary-list">
                <li style="word-break:keep-all;overflow-wrap:break-word;">
                    연준 위원들이 추가 금리 인상 가능성을 언급하며 긴축 기조를 재확인했다.
                </li>
                <li style="word-break:keep-all;overflow-wrap:break-word;">
                    유로존 물가가 2.8%로 반등하는 등 글로벌 인플레이션 압력이 확대됐다.
                </li>
                <li style="word-break:keep-all;overflow-wrap:break-word;">
                    한국 증시는 긴축 장기화 리스크에 대비할 필요성이 커졌다.
                </li>
            </ul>
        </div>

        <div class="attention-box">
            <p class="attention-label" style="word-break:keep-all;overflow-wrap:break-word;">
                주목 포인트
            </p>
            <p class="attention-point" style="word-break:keep-all;overflow-wrap:break-word;">
                다음 FOMC의 금리 결정과 유로존 물가 2.8% 흐름의 지속 여부.
            </p>
        </div>

        <div class="cta-box">
            <p class="cta-text" style="word-break:keep-all;overflow-wrap:break-word;">
                댓글에 <span style="font-weight:900;">'분석'</span> 남겨주세요!
            </p>
        </div>

        <div class="source" style="word-break:keep-all;overflow-wrap:break-word;">
            출처 · Reuters
        </div>
    </div>
</body>
</html>
