<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalFeed - 수혜주는?</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #F8F6F0;
            color: #0D0D0D;
        }
        .container {
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            background-color: #F8F6F0;
            position: relative;
            box-sizing: border-box;
            padding: 70px 80px;
        }
        .signalfeed-header {
            position: absolute;
            top: 70px;
            left: 80px;
            font-size: 24px;
            font-weight: 700;
            color: #00C853;
        }
        .slide-number {
            position: absolute;
            top: 70px;
            right: 80px;
            font-size: 24px;
            font-weight: 500;
            color: #D0CCC6;
        }
        .main-title {
            font-size: 68px;
            font-weight: 800;
            line-height: 1.2;
            color: #0D0D0D;
            margin-top: 100px;
            margin-bottom: 20px;
            text-align: left;
            position: relative;
            padding-left: 20px;
        }
        .main-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 80%;
            background-color: #00C853;
            border-radius: 4px;
        }
        .subtitle {
            font-size: 30px;
            font-weight: 500;
            color: #555;
            margin-bottom: 80px;
            padding-left: 20px;
        }
        .benefit-list {
            display: flex;
            flex-direction: column;
            gap: 50px;
        }
        .benefit-item {
            background-color: #F0F4EC; /* Slightly different background for item */
            border-left: 8px solid #00C853;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .sector-name {
            font-size: 48px;
            font-weight: 700;
            color: #00C853;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .sector-name::before {
            content: '✓';
            color: #00C853;
            font-size: 50px;
            margin-right: 20px;
            line-height: 1;
        }
        .detail-text {
            font-size: 32px;
            font-weight: 400;
            line-height: 1.6;
            color: #333;
        }
        .highlight-benefit {
            color: #00C853;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="slide-3" class="container">
        <div class="signalfeed-header" style="word-break:keep-all;overflow-wrap:break-word;">SIGNALFEED</div>
        <div class="slide-number" style="word-break:keep-all;overflow-wrap:break-word;">3/5</div>

        <h1 class="main-title" style="word-break:keep-all;overflow-wrap:break-word;">
            긴축 강화 속, <br>
            수혜 예상 섹터는?
        </h1>
        <p class="subtitle" style="word-break:keep-all;overflow-wrap:break-word;">
            금리 인상 기조 재확인에 따른 업종별 영향 분석
        </p>

        <div class="benefit-list">
            <div class="benefit-item">
                <div class="sector-name" style="word-break:keep-all;overflow-wrap:break-word;">은행</div>
                <p class="detail-text" style="word-break:keep-all;overflow-wrap:break-word;">
                    금리 인상 기조가 강화되며 예대마진이 <span class="highlight-benefit" style="word-break:keep-all;overflow-wrap:break-word;">0.2%p 개선</span>됐다.
                </p>
            </div>
            <div class="benefit-item">
                <div class="sector-name" style="word-break:keep-all;overflow-wrap:break-word;">보험</div>
                <p class="detail-text" style="word-break:keep-all;overflow-wrap:break-word;">
                    금리가 <span class="highlight-benefit" style="word-break:keep-all;overflow-wrap:break-word;">5.50%까지 오르며</span> 보험사 운용자산 수익률이 높아졌다.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
