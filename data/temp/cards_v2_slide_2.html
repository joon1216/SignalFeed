<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalFeed - 무슨 일이?</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #F8F6F0;
            color: #0D0D0D;
        }
        .container {
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            background-color: #F8F6F0;
            position: relative;
            box-sizing: border-box;
            padding: 70px 80px;
        }
        .signalfeed-header {
            position: absolute;
            top: 70px;
            left: 80px;
            font-size: 24px;
            font-weight: 700;
            color: #00C853;
        }
        .slide-number {
            position: absolute;
            top: 70px;
            right: 80px;
            font-size: 24px;
            font-weight: 500;
            color: #D0CCC6;
        }
        h1 {
            font-size: 68px;
            font-weight: 800;
            line-height: 1.2;
            color: #0D0D0D;
            margin-top: 100px;
            margin-bottom: 80px;
            text-align: center;
        }
        .fact-section {
            display: flex;
            flex-direction: column;
            gap: 60px;
            margin-top: 40px;
        }
        .fact-item {
            display: flex;
            align-items: flex-start;
            gap: 40px;
            position: relative;
        }
        .fact-number {
            font-size: 96px;
            font-weight: 900;
            color: #D0CCC6;
            line-height: 1;
            margin-top: -15px; /* Adjust for visual alignment */
            flex-shrink: 0;
            width: 90px;
            text-align: right;
            position: relative;
            top: 0px;
        }
        .fact-text {
            flex-grow: 1;
            font-size: 36px;
            font-weight: 500;
            line-height: 1.5;
            color: #0D0D0D;
            border-left: 2px solid #D0CCC6;
            padding-left: 40px;
        }
        .highlight {
            background-color: #FFE566;
            padding: 2px 8px;
            border-radius: 6px;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
        }
        .divider {
            height: 1px;
            background-color: #D0CCC6;
            margin: 60px 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="slide-2" class="container">
        <div class="signalfeed-header" style="word-break:keep-all;overflow-wrap:break-word;">SIGNALFEED</div>
        <div class="slide-number" style="word-break:keep-all;overflow-wrap:break-word;">2/5</div>

        <h1 style="word-break:keep-all;overflow-wrap:break-word;">
            물가, 다시 오르나?<br>
            글로벌 인플레이션 압력
        </h1>

        <div class="fact-section">
            <div class="fact-item">
                <div class="fact-number" style="word-break:keep-all;overflow-wrap:break-word;">01</div>
                <div class="fact-text" style="word-break:keep-all;overflow-wrap:break-word;">
                    미국 연준 위원 다수가 물가 상승 위험을 이유로 추가 금리 인상 가능성을 언급하며 긴축 기조를 재확인했다.
                </div>
            </div>
            <div class="divider"></div>
            <div class="fact-item">
                <div class="fact-number" style="word-break:keep-all;overflow-wrap:break-word;">02</div>
                <div class="fact-text" style="word-break:keep-all;overflow-wrap:break-word;">
                    유로존 5월 소비자물가 상승률은 <span class="highlight" style="word-break:keep-all;overflow-wrap:break-word;">2.8%</span>로 전월 <span class="highlight" style="word-break:keep-all;overflow-wrap:break-word;">2.6%</span>에서 반등했다.
                </div>
            </div>
            <div class="divider"></div>
            <div class="fact-item">
                <div class="fact-number" style="word-break:keep-all;overflow-wrap:break-word;">03</div>
                <div class="fact-text" style="word-break:keep-all;overflow-wrap:break-word;">
                    미국 셰일 유정 완결 대기 물량은 약 <span class="highlight" style="word-break:keep-all;overflow-wrap:break-word;">4,150개</span>로 사상 최저 수준까지 줄었다.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
