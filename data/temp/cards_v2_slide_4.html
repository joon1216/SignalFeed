<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalFeed - 주의할 섹터는?</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #F8F6F0;
            color: #0D0D0D;
        }
        .container {
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            background-color: #F8F6F0;
            position: relative;
            box-sizing: border-box;
            padding: 70px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .signalfeed-header {
            position: absolute;
            top: 70px;
            left: 80px;
            font-size: 24px;
            font-weight: 700;
            color: #00C853;
        }
        .slide-number {
            position: absolute;
            top: 70px;
            right: 80px;
            font-size: 24px;
            font-weight: 500;
            color: #D0CCC6;
        }
        .section-label {
            font-size: 32px;
            font-weight: 400;
            font-style: italic;
            color: #777;
            margin-bottom: 20px;
            align-self: flex-start;
            padding-left: 10px;
            border-bottom: 1px solid #D0CCC6;
            padding-bottom: 10px;
            width: 100%;
        }
        .main-heading {
            font-size: 68px;
            font-weight: 800;
            line-height: 1.2;
            color: #FF3D3D; /* Caution color for heading */
            margin-top: 50px;
            margin-bottom: 80px;
            text-align: center;
        }
        .caution-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px 70px;
            width: 100%;
        }
        .caution-item {
            background-color: #FFF0F0; /* Light red background */
            border: 2px solid #FF3D3D;
            border-radius: 12px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .caution-sector {
            font-size: 44px;
            font-weight: 700;
            color: #FF3D3D;
            display: flex;
            align-items: center;
        }
        .caution-sector::before {
            content: '!';
            font-size: 50px;
            font-weight: 900;
            color: #FF3D3D;
            margin-right: 15px;
            line-height: 1;
        }
        .caution-detail {
            font-size: 30px;
            font-weight: 500;
            line-height: 1.5;
            color: #444;
        }
        .highlight-caution {
            color: #FF3D3D;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="slide-4" class="container">
        <div class="signalfeed-header" style="word-break:keep-all;overflow-wrap:break-word;">SIGNALFEED</div>
        <div class="slide-number" style="word-break:keep-all;overflow-wrap:break-word;">4/5</div>

        <p class="section-label" style="word-break:keep-all;overflow-wrap:break-word;">[ MARKET OUTLOOK ]</p>
        <h1 class="main-heading" style="word-break:keep-all;overflow-wrap:break-word;">
            주의가 필요한<br>
            섹터는 어디?
        </h1>

        <div class="caution-grid">
            <div class="caution-item">
                <div class="caution-sector" style="word-break:keep-all;overflow-wrap:break-word;">건설·부동산</div>
                <p class="caution-detail" style="word-break:keep-all;overflow-wrap:break-word;">
                    조달 금리가 <span class="highlight-caution" style="word-break:keep-all;overflow-wrap:break-word;">5.50%로 오르며</span> 이자 부담이 커졌다.
                </p>
            </div>
            <div class="caution-item">
                <div class="caution-sector" style="word-break:keep-all;overflow-wrap:break-word;">소비재·운송</div>
                <p class="caution-detail" style="word-break:keep-all;overflow-wrap:break-word;">
                    긴축 장기화와 유가 부담으로 소비·물류 비용이 가중됐다.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
