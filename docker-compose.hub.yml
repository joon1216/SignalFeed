# ──────────────────────────────────────────────────────────────────
# IssueFit - Docker Hub 배포용 compose 파일
#
# 사용법 (받는 쪽 PC):
#   1. 이 파일과 .env.example, data/ 폴더만 받기
#   2. cp .env.example .env  (필요 시 API 키 입력)
#   3. docker compose -f docker-compose.hub.yml up -d
#   4. http://localhost:8501 접속
#
# ──────────────────────────────────────────────────────────────────

services:
  app:
    image: beakwol/issuefit:latest
    container_name: issuefit-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - issuefit-net

  ollama:
    image: ollama/ollama:latest
    container_name: issuefit-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    networks:
      - issuefit-net

  ollama-init:
    image: ollama/ollama:latest
    container_name: issuefit-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        echo '[ollama-init] Pulling model: ${OLLAMA_MODEL:-gemma2:2b} ...' &&
        ollama pull ${OLLAMA_MODEL:-gemma2:2b} &&
        echo '[ollama-init] Done.'
      "
    restart: "no"
    networks:
      - issuefit-net

volumes:
  ollama-data:
    name: issuefit-ollama-data

networks:
  issuefit-net:
    name: issuefit-network
